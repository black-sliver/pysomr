name: Build

on:
  workflow_dispatch:

jobs:
  build_aot:
    # NOTE: dotnet 10 minimum glibc is 2.27 on x86_64 and arm64
    #       dotnet 10 minimum glibc is 2.36 on arm 32bit, but we currently don't build those
    name: Build AOT lib for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            container: quay.io/pypa/manylinux_2_28_x86_64
            py: '/opt/python/cp313-cp313/bin/python'
          - os: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            py: '/opt/python/cp313-cp313/bin/python'
          - os: windows-2025
            py: 'python'
          - os: windows-11-arm
            py: 'python'
          - os: macos-15
            py: 'python'

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1

    steps:
    # NOTE we need to use old versions of some actions because of available node
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        persist-credentials: false
    - name: Set up dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10'
    - name: Install dependencies (dnf)
      if: ${{ runner.os == 'Linux' }}
      run: dnf install icu -y
    - name: Print package info
      if: ${{ runner.os == 'Linux' }}
      run: yum info icu
    - name: Set up Python (if needed)
      if: ${{ runner.os != 'Linux' }}
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Build native library
      if: ${{ !startsWith(matrix.os, 'macos-') }}
      shell: bash
      run: |
        "${{ matrix.py }}" -m pip install setuptools==80.9.0
        "${{ matrix.py }}" -c 'from setup import CustomCommand; CustomCommand.dotnet_publish()'
    - name: Build universal2 library
      if: ${{ startsWith(matrix.os, 'macos-') }}
      shell: bash
      run: |
        "${{ matrix.py }}" -m pip install setuptools==80.9.0
        "${{ matrix.py }}" -c 'from setup import CustomCommand; CustomCommand.dotnet_publish_universal2()'
    - name: Store native library
      if: ${{ !startsWith(matrix.os, 'macos-') }}
      uses: actions/upload-artifact@v4
      with:
        name: aot-${{ runner.os }}-${{ runner.arch }}
        path: ./SecretOfManaRandomizer/SoMRandomizer.api/bin/Release/net10.0/native
    - name: Store universal2 library
      if: ${{ startsWith(matrix.os, 'macos-') }}
      uses: actions/upload-artifact@v4
      with:
        name: aot-${{ runner.os }}-universal2
        path: ./build

  build_wheels:
    needs: build_aot
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-22.04-arm, windows-2025, windows-11-arm, macos-15]
        # cibw_python: ["cp310-*", "cp311-*", "cp312-*", "cp313-*", "cp314-*"]
        # FIXME: do we need to set 'cibw_arch' to 'universal2' for macOS or is this the default now?

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      with:
        submodules: 'recursive'
        persist-credentials: false
    - name: Set up dotnet
      uses: actions/setup-dotnet@2016bd2012dba4e32de620c46fe006a3ac9f0602
      with:
        dotnet-version: '10'
    - name: Set up Python
      if: ${{ startsWith(matrix.os, 'ubuntu') }}
      uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
    - name: Prebuild native library
      if: ${{ startsWith(matrix.os, 'ubuntu') }}
      run: |
        pip install setuptools==80.9.0
        python -c 'from setup import CustomCommand; CustomCommand.dotnet_publish()'
    - name: Build wheels
      uses: pypa/cibuildwheel@298ed2fb2c105540f5ed055e8a6ad78d82dd3a7e
    - name: Store wheels
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
      with:
        name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
        path: ./wheelhouse/*.whl


  build_sdist:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      with:
        submodules: 'recursive'

    - name: Set up Python
      uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
    - name: Install requirements
      run: python -m pip install -U pip build
    - name: Build source distribution
      run: python -m build . --sdist
    - name: Store source distribution
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
      with:
        name: cibw-sdist
        path: dist/
